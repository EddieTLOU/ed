<!DOCTYPE html>
<html lang="en">
<head>
    <title>ED Studio Pro | Clean Build</title>
    <style>
        :root { --glass-bg: rgba(255, 255, 255, 0.05); --red: #ff0000; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .glass { background: var(--glass-bg); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        
        header { padding: 20px; }
        .page { padding: 20px; height: 80vh; }
        
        #editor { width: 100%; height: 45vh; background: transparent; border: none; color: #ff5555; padding: 20px; font-family: monospace; font-size: 18px; outline: none; }
        #preview { width: 100%; height: 25vh; overflow-y: auto; padding: 20px; border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; position: relative; }
        
        .glass-btn { padding: 12px 24px; border-radius: 12px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); color: white; cursor: pointer; }
    </style>
</head>
<body>

<header class="glass" style="margin:20px;">
    <h1>ED STUDIO PRO</h1>
</header>

<div id="editor-page" class="page">
    <textarea id="editor" class="glass" placeholder="gradient up red black blue&#10;txt Welcome to ED c:white p:middle s:40"></textarea>
    <div style="margin-top:20px; display:flex; gap:10px;">
        <button class="glass-btn" onclick="runProject()">RUN PROJECT</button>
        <button class="glass-btn" onclick="document.getElementById('preview').requestFullscreen()">FULLSCREEN</button>
        <button class="glass-btn" onclick="saveFile()">SAVE .ED</button>
    </div>
    <div id="preview" class="glass" style="margin-top:20px;"></div>
</div>

<script>
    const ED_ENGINE = {
        gradient: (p) => {
            const parts = p.split(' ');
            const dirMap = { 'up': 'to top', 'down': 'to bottom', 'left': 'to left', 'right': 'to right' };
            document.getElementById('preview').style.background = `linear-gradient(${dirMap[parts[0]] || 'to bottom'}, ${parts.slice(1).join(', ')})`;
        },
        txt: (p) => {
            const parts = p.split(' ');
            let message = [], color = "white", pos = "absolute", size = "24";
            const posMap = { 
                'top-left': 'top:10px; left:10px;', 
                'middle': 'top:50%; left:50%; transform:translate(-50%,-50%);', 
                'bottom-right': 'bottom:10px; right:10px;' 
            };
            parts.forEach(part => {
                if(part.startsWith('c:')) color = part.split(':')[1];
                else if(part.startsWith('p:')) pos = posMap[part.split(':')[1]] || '';
                else if(part.startsWith('s:')) size = part.split(':')[1];
                else message.push(part);
            });
            const div = document.createElement('div');
            div.style.cssText = `position: absolute; color: ${color}; ${pos}; font-size: ${size}px;`;
            div.innerText = message.join(' ');
            document.getElementById('preview').appendChild(div);
        }
    };

    function runProject() {
        document.getElementById('preview').innerHTML = "";
        document.getElementById('editor').value.split('\n').forEach(line => {
            const spaceIdx = line.indexOf(' ');
            if (spaceIdx > -1) {
                const cmd = line.substring(0, spaceIdx);
                const args = line.substring(spaceIdx + 1);
                if(ED_ENGINE[cmd]) ED_ENGINE[cmd](args);
            }
        });
    }

    function saveFile() {
        const blob = new Blob([document.getElementById('editor').value], {type: "text/plain"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "project.ed";
        a.click();
    }
</script>
</body>
</html>
