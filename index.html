<!DOCTYPE html>
<html lang="en">
<head>
    <title>ED Studio Pro | Image Button Update</title>
    <style>
        :root { 
            --glass-bg: rgba(255, 255, 255, 0.05); 
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body { 
            margin: 0; background: #000; color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; 
            height: 100vh; overflow: hidden; 
        }
        
        #ide-view {
            padding: 30px; height: 100vh; box-sizing: border-box;
            max-width: 1200px; margin: 0 auto; display: block;
        }
        
        #runtime-view {
            display: none; height: 100vh; width: 100vw; 
            position: absolute; top: 0; left: 0; 
        }

        .page { 
            display: none; height: 100vh; width: 100vw; 
            position: absolute; top: 0; left: 0; 
        }
        .active-page { display: block; }
        
        .glass { 
            background: var(--glass-bg); backdrop-filter: blur(40px); 
            border: 1px solid var(--glass-border); 
        }
        
        #editor { 
            width: 100%; height: 60vh; background: rgba(0, 0, 0, 0.3); 
            color: #ff5555; padding: 20px; font-family: monospace; 
            font-size: 16px; border-radius: 24px; border: 1px solid #333;
            outline: none; resize: none; box-sizing: border-box; white-space: pre;
        }
        
        .btn-panel { display: flex; gap: 15px; margin-top: 20px; }
        
        .glass-btn { 
            padding: 15px 30px; border-radius: 16px; 
            background: rgba(255,255,255,0.05); color: white; cursor: pointer; 
            border: 1px solid var(--glass-border); font-size: 14px;
            font-weight: 600; letter-spacing: 1px; transition: all 0.3s ease;
        }
        .glass-btn:hover { background: rgba(255,255,255,0.15); }

        #exit-btn {
            position: absolute; top: 20px; right: 20px;
            padding: 12px 24px; background: rgba(255, 0, 0, 0.2);
            border: 1px solid rgba(255, 0, 0, 0.5); color: white;
            border-radius: 12px; cursor: pointer; backdrop-filter: blur(10px);
            font-weight: bold; z-index: 9999; transition: 0.3s;
        }
        #exit-btn:hover { background: rgba(255, 0, 0, 0.5); }
    </style>
</head>
<body>

<div id="ide-view">
    <h1 style="font-weight: 300; letter-spacing: 2px;">ED STUDIO PRO</h1>
    <textarea id="editor" class="glass">gradient up #1a1a2e #16213e
add txt Click The Image! c:white p:top-left s:40

add img button https://picsum.photos/300 p:middle s:300 id:67

new page 67
gradient up #3a1c71 #d76d77 #ffaf7b
add txt You Clicked It! c:white p:middle s:50</textarea>
    
    <div class="btn-panel">
        <button class="glass-btn" onclick="startProject(false)">RUN PROJECT</button>
        <button class="glass-btn" onclick="startProject(true)">FULLSCREEN</button>
        <button class="glass-btn" onclick="saveFile()">SAVE .ED</button>
    </div>
</div>

<div id="runtime-view">
    <button id="exit-btn" onclick="exitProject()">BACK</button>
    <div id="page-container"></div>
</div>

<script>
    let targetPageId = 'app-root';

    function ensurePageExists(id) {
        if (!document.getElementById(id)) {
            const div = document.createElement('div');
            div.id = id;
            div.className = 'page';
            div.style.background = '#000'; 
            
            if (id !== 'app-root') {
                const inAppBackBtn = document.createElement('button');
                inAppBackBtn.innerText = "BACK";
                inAppBackBtn.style.cssText = "position:absolute; top:30px; left:30px; padding:12px 24px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; border-radius:12px; cursor:pointer; backdrop-filter:blur(10px); font-family:sans-serif; font-weight:bold; z-index:99; transition: transform 0.2s;";
                inAppBackBtn.onmouseover = () => inAppBackBtn.style.transform = 'scale(1.05)';
                inAppBackBtn.onmouseout = () => inAppBackBtn.style.transform = 'scale(1)';
                inAppBackBtn.onclick = () => {
                    document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
                    document.getElementById('app-root').classList.add('active-page');
                };
                div.appendChild(inAppBackBtn);
            }
            document.getElementById('page-container').appendChild(div);
        }
    }

    const ED_ENGINE = {
        'use': (args) => {
            const parts = args.split(' ');
            if (parts[0] === 'page') {
                ensurePageExists(parts[1]);
                targetPageId = parts[1];
            }
        },
        'new': (args) => {
            const parts = args.split(' ');
            if (parts[0] === 'page') {
                ensurePageExists(parts[1]);
                targetPageId = parts[1];
            }
        },
        'gradient': (args) => {
            const parts = args.split(' ');
            const dirMap = { 'up': 'to top', 'down': 'to bottom', 'left': 'to left', 'right': 'to right' };
            const grad = `linear-gradient(${dirMap[parts[0]] || 'to bottom'}, ${parts.slice(1).join(', ')})`;
            
            ensurePageExists(targetPageId);
            const target = document.getElementById(targetPageId);
            if(target) target.style.background = grad;
        },
        'add': (args) => {
            const parts = args.split(' ');
            let commandType = parts[0]; 
            
            ensurePageExists(targetPageId);
            const targetEl = document.getElementById(targetPageId);
            if (!targetEl) return;

            let content = [], color = "white", pos = "absolute", target = "", size = "24";
            const posMap = { 
                'middle': 'top:50%; left:50%; transform:translate(-50%,-50%);',
                'top-left': 'top:30px; left:30px;', 'top-right': 'top:30px; right:30px;',
                'bottom-left': 'bottom:30px; left:30px;', 'bottom-right': 'bottom:30px; right:30px;'
            };
            
            let startIndex = 1;
            let imgUrl = "";

            // Smart Sub-Type Parsing
            if (commandType === 'button' && parts[1] === 'txt') {
                commandType = 'button-txt';
                startIndex = 2;
            } else if (commandType === 'img' && parts[1] === 'button') {
                commandType = 'img-button';
                imgUrl = parts[2];
                startIndex = 3;
                size = "150"; // default size for image buttons
            } else if (commandType === 'img') {
                imgUrl = parts[1];
                startIndex = 2;
                size = "200"; 
            }

            for (let i = startIndex; i < parts.length; i++) {
                const p = parts[i];
                if (p.startsWith('c:')) { color = p.split(':')[1]; }
                else if (p.startsWith('p:')) { pos = posMap[p.split(':')[1]] || ''; }
                else if (p.startsWith('id:')) { target = p.split(':')[1]; }
                else if (p.startsWith('s:')) { size = p.split(':')[1]; }
                else { content.push(p); } 
            }

            if (commandType === 'button-txt') {
                const btn = document.createElement('button');
                btn.innerText = content.join(' ');
                btn.style.cssText = `position: absolute; ${pos} padding: 18px 36px; background: ${color}; color: white; border-radius: 16px; border:1px solid rgba(255,255,255,0.2); cursor:pointer; font-size:${size}px; font-weight:600; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index:10; transition: transform 0.2s ease;`;
                btn.onmouseover = () => btn.style.transform = pos.includes('translate') ? 'translate(-50%, -50%) scale(1.05)' : 'scale(1.05)';
                btn.onmouseout = () => btn.style.transform = pos.includes('translate') ? 'translate(-50%, -50%) scale(1)' : 'scale(1)';
                btn.onclick = () => {
                    document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
                    ensurePageExists(target); 
                    const targetPage = document.getElementById(target);
                    if(targetPage) targetPage.classList.add('active-page');
                };
                targetEl.appendChild(btn);
            } 
            else if (commandType === 'txt') {
                const div = document.createElement('div');
                div.style.cssText = `position: absolute; ${pos} color: ${color}; font-size: ${size}px; font-weight: 500; text-shadow: 0 2px 10px rgba(0,0,0,0.5); white-space: nowrap; z-index:10;`;
                div.innerText = content.join(' ');
                targetEl.appendChild(div);
            }
            else if (commandType === 'img') {
                const img = document.createElement('img');
                img.src = imgUrl;
                img.style.cssText = `position: absolute; ${pos} width: ${size}px; height: auto; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index:5;`;
                targetEl.appendChild(img);
            }
            else if (commandType === 'img-button') {
                const imgBtn = document.createElement('img');
                imgBtn.src = imgUrl;
                imgBtn.style.cssText = `position: absolute; ${pos} width: ${size}px; height: auto; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index:10; cursor:pointer; transition: transform 0.2s ease;`;
                // Check if it's centered to preserve the translate properties during animation
                imgBtn.onmouseover = () => imgBtn.style.transform = pos.includes('translate') ? 'translate(-50%, -50%) scale(1.05)' : 'scale(1.05)';
                imgBtn.onmouseout = () => imgBtn.style.transform = pos.includes('translate') ? 'translate(-50%, -50%) scale(1)' : 'scale(1)';
                imgBtn.onclick = () => {
                    document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
                    ensurePageExists(target); 
                    const targetPage = document.getElementById(target);
                    if(targetPage) targetPage.classList.add('active-page');
                };
                targetEl.appendChild(imgBtn);
            }
        },
        'txt': (args) => {
            ED_ENGINE['add'](`txt ${args}`);
        }
    };

    function startProject(goFullscreen) {
        document.getElementById('ide-view').style.display = 'none';
        document.getElementById('runtime-view').style.display = 'block';

        const container = document.getElementById('page-container');
        container.innerHTML = "";
        
        targetPageId = 'app-root';
        ensurePageExists('app-root');
        document.getElementById('app-root').classList.add('active-page');

        document.getElementById('editor').value.split('\n').forEach(line => {
            const trimmed = line.trim();
            if(!trimmed) return;
            const spaceIdx = trimmed.indexOf(' ');
            if(spaceIdx === -1) return;
            
            const cmd = trimmed.substring(0, spaceIdx);
            const args = trimmed.substring(spaceIdx + 1);
            if(ED_ENGINE[cmd]) ED_ENGINE[cmd](args);
        });

        if(goFullscreen) {
            document.documentElement.requestFullscreen().catch(err => console.log(err));
        }
    }

    function exitProject() {
        if (document.fullscreenElement) document.exitFullscreen();
        document.getElementById('runtime-view').style.display = 'none';
        document.getElementById('ide-view').style.display = 'block';
    }

    function saveFile() {
        const text = document.getElementById('editor').value;
        const blob = new Blob([text], {type: "text/plain"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "project.ed";
        a.click();
    }
</script>
</body>
</html>
